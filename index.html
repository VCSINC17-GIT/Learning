<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Age Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>


  <main class="page-main">
    <div class="page-title-bar">
      <h1>Age Calculator</h1>
      <p>Enter your date of birth to find out your exact age </p>
      <p>And if you authorization </p>
      <p>this is the beuatiful day.   </p>
    </div>

    <div class="container">
      <div class="card">
        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" max="" />
        </div>

        <button id="calculateBtn" onclick="calculateAge()">Calculate Age</button>

        <div class="result" id="result" hidden>
          <div class="age-display">
            <div class="age-block">
              <span class="age-number" id="ageYears">0</span>
              <span class="age-label">Years</span>
            </div>
            <div class="age-divider"></div>
            <div class="age-block">
              <span class="age-number" id="ageMonths">0</span>
              <span class="age-label">Months</span>
            </div>
            <div class="age-divider"></div>
            <div class="age-block">
              <span class="age-number" id="ageDays">0</span>
              <span class="age-label">Days</span>
            </div>
          </div>

          <div class="extra-info">
            <div class="info-item">
              <span class="info-label">Next Birthday</span>
              <span class="info-value" id="nextBirthday"></span>
            </div>
            <div class="info-item">
              <span class="info-label">Day of Birth</span>
              <span class="info-value" id="dayOfBirth"></span>
            </div>
          </div>
        </div>

        <p class="error" id="error" hidden>Please select a valid date of birth.</p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 VCSExpert. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
